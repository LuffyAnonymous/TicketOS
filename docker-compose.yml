version: '3.8'

services:
  web:
    build: .
    container_name: ticketos_web
    restart: unless-stopped
    init: true
    ipc: host
    stop_grace_period: 3m
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    volumes:
      - ticketos-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

