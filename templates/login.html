<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign In | OrderHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --input-bg: #eff6ff;
      --radius: 12px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      background: #fff;
      width: 100%;
      max-width: 440px;
      padding: 48px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-header h1 {
      color: var(--primary);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid transparent;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      background-color: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      padding: 4px;
    }

    .login-btn {
      width: 100%;
      background-color: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background-color: #fef2f2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
    }

    .remember-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
    }

    .remember-row input {
        cursor: pointer;
    }

    .loader {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        display: none;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>OrderHub</h1>
      <p>Sign in to your account</p>
    </div>

    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="text" id="username" class="form-input" placeholder="name@example.com" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <label class="remember-row">
        <input type="checkbox" id="rememberMe">
        <span>Remember me</span>
      </label>

      <button type="submit" class="login-btn" id="loginBtn">
        <div id="btnLoader" class="loader"></div>
        <span id="btnIcon">➜</span>
        <span id="btnText">Sign In</span>
      </button>
    </form>
  </div>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const btnLoader = document.getElementById('btnLoader');
    const errorBox = document.getElementById('errorBox');

    form.onsubmit = async (e) => {
      e.preventDefault();
      
      // Reset state
      errorBox.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      btnIcon.style.display = 'none';
      btnLoader.style.display = 'block';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember })
        });

        const data = await res.json();
        if (res.ok) {
          location.href = '/';
        } else {
          errorBox.textContent = data.error || 'Invalid username or password';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'Connection error. Please try again.';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        btnIcon.style.display = 'inline';
        btnLoader.style.display = 'none';
      }
    };
  </script>
</body>
</html>
